<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動物卡 V2 動作強度比較</title>
    <style>
        @page {
            size: A4 landscape;
            margin: 0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #d5d5d5;
            color: #111;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .screen-header {
            position: sticky;
            top: 0;
            z-index: 2;
            padding: 12px 20px;
            border-bottom: 2px solid #111;
            background: #fff;
            font-size: 14px;
            font-weight: 800;
        }

        .page {
            width: 297mm;
            height: 210mm;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 3mm;
            margin: 10mm auto;
            padding: 7mm 10mm;
            overflow: hidden;
            background: #fff;
            break-after: page;
            page-break-after: always;
        }

        .page:last-child {
            break-after: auto;
            page-break-after: auto;
        }

        .page-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 8mm;
            border-bottom: 0.6mm solid #111;
            padding-bottom: 2mm;
        }

        h1 {
            margin: 0;
            font-size: 18pt;
            line-height: 1;
        }

        .ability {
            font-size: 11pt;
            font-weight: 800;
        }

        .comparison {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 3mm;
            min-height: 0;
        }

        .baseline,
        .candidates {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9mm;
            min-height: 0;
        }

        figure {
            margin: 0;
        }

        figcaption {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 4mm;
            margin-bottom: 1mm;
            font-size: 9pt;
            font-weight: 800;
        }

        .strength {
            color: #555;
            font-size: 8pt;
            font-weight: 600;
        }

        .art-frame {
            width: 114mm;
            height: 70mm;
            overflow: hidden;
            border: 0.45mm solid #111;
            border-radius: 2mm;
            background: #fff;
        }

        .art-frame img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: center;
            filter: grayscale(1) contrast(1.08);
        }

        @media print {
            body {
                background: #fff;
            }

            .screen-header {
                display: none;
            }

            .page {
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <header class="screen-header">
        動物卡 V2 動作強度比較｜4 頁 A4 橫式｜圖片框 114×70mm｜現有版在上、候選版在下
    </header>
    <main id="pages"></main>
    <script>
        const animals = [
            {
                name: "非洲獅",
                ability: "大吼",
                baseline: "images/lion.png",
                v21: "images-action-test/lion-v21.png",
                v22: "images-action-test/lion-v22.png"
            },
            {
                name: "皇帝企鵝",
                ability: "極地潛行",
                baseline: "images/emperor_penguin.png",
                v21: "images-action-test/emperor-penguin-v21.png",
                v22: "images-action-test/emperor-penguin-v22.png"
            },
            {
                name: "紅毛猩猩",
                ability: "巧手造物",
                baseline: "images/orangutan.png",
                v21: "images-action-test/orangutan-v21.png",
                v22: "images-action-test/orangutan-v22.png"
            },
            {
                name: "金剛鸚鵡",
                ability: "彩翼破殼",
                baseline: "images/scarlet_macaw.png",
                v21: "images-action-test/scarlet-macaw-v21.png",
                v22: "images-action-test/scarlet-macaw-v22.png"
            }
        ];

        function figure(src, label, strength) {
            const element = document.createElement("figure");
            element.innerHTML = `
                <figcaption>
                    <span>${label}</span>
                    <span class="strength">${strength}</span>
                </figcaption>
                <div class="art-frame"><img src="${src}" alt="${label}"></div>
            `;
            return element;
        }

        const pages = document.querySelector("#pages");
        animals.forEach((animal) => {
            const page = document.createElement("section");
            page.className = "page";
            page.innerHTML = `
                <header class="page-title">
                    <h1>${animal.name}</h1>
                    <span class="ability">特殊能力：${animal.ability}</span>
                </header>
                <div class="comparison">
                    <div class="baseline"></div>
                    <div class="candidates"></div>
                </div>
            `;
            page.querySelector(".baseline").append(figure(animal.baseline, "V2 現有版", "基準"));
            page.querySelector(".candidates").append(
                figure(animal.v21, "V2.1 輕度", "約 +10%"),
                figure(animal.v22, "V2.2 中度", "約 +20%")
            );
            pages.append(page);
        });
    </script>
</body>
</html>
