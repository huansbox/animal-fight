<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>揭露卡需求區 A/B 比較</title>
    <style>
        @page { size: A4 portrait; margin: 0; }

        @font-face {
            font-family: "Bpmf Rounded";
            src: url("fonts/bopomofo/rounded-medium.woff2") format("woff2");
            font-style: normal;
            font-weight: 500;
            font-display: block;
        }

        @font-face {
            font-family: "Bpmf Rounded";
            src: url("fonts/bopomofo/rounded-bold.woff2") format("woff2");
            font-style: normal;
            font-weight: 800;
            font-display: block;
        }

        :root {
            --font: "Bpmf Rounded", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        * { box-sizing: border-box; }

        html,
        body {
            margin: 0;
            background: #ccc;
            color: #000;
            font-family: var(--font);
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .page {
            width: 210mm;
            height: 297mm;
            display: grid;
            grid-template-rows: repeat(2, 148.5mm);
            margin: 8mm auto;
            overflow: hidden;
            background: #fff;
        }

        .comparison-cell {
            position: relative;
            display: grid;
            place-items: center;
            width: 210mm;
            height: 148.5mm;
            border-bottom: 0.15mm solid #bbb;
        }

        .variant-label {
            position: absolute;
            top: 4mm;
            left: 8mm;
            padding: 1.2mm 2.5mm;
            border: 0.35mm solid #000;
            border-radius: 1.5mm;
            background: #fff;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            font-size: 8pt;
            font-weight: 700;
            line-height: 1;
        }

        .card-shell {
            position: relative;
            width: 170mm;
            height: 118.5mm;
            outline: 0.3mm dashed #666;
        }

        .reveal-card {
            position: absolute;
            inset: 2mm;
            display: grid;
            grid-template-rows: 13mm 47mm 1fr;
            overflow: hidden;
            border: 0.65mm solid #000;
            border-radius: 4mm;
            background: #fff;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 3mm;
            padding: 1.5mm 4mm;
            border-bottom: 0.45mm solid #000;
        }

        .card-number {
            width: 8mm;
            height: 8mm;
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            border-radius: 50%;
            background: #000;
            color: #fff;
            font-size: 11pt;
            font-weight: 800;
        }

        .card-title {
            min-width: 0;
            margin: 0;
            overflow: hidden;
            font-size: 15pt;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: 0.06em;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .player-count {
            margin-left: auto;
            font-size: 7.8pt;
            font-weight: 800;
            white-space: nowrap;
        }

        .scene {
            overflow: hidden;
            border-bottom: 0.45mm solid #000;
            background: #eee;
        }

        .scene img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: center;
            filter: grayscale(1) contrast(1.08);
        }

        .content {
            display: grid;
            min-height: 0;
            padding: 3mm 4mm;
        }

        .reason {
            align-self: center;
            font-size: 9pt;
            font-weight: 500;
            line-height: 1.45;
        }

        .reason strong {
            display: block;
            margin-bottom: 1mm;
            font-size: 10pt;
            font-weight: 800;
        }

        .requirement {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            align-items: stretch;
            min-width: 0;
        }

        .range {
            display: grid;
            grid-column: 1 / -1;
            grid-row: 1;
            place-items: center;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .attr {
            display: grid;
            grid-row: 2;
            align-items: center;
            min-width: 0;
        }

        .attr img {
            object-fit: contain;
            filter: grayscale(1) contrast(1.12);
        }

        .attr-name {
            font-weight: 800;
            text-align: center;
            white-space: nowrap;
        }

        /* A：接近較早稿的緊湊比例，保留較多呼吸空間。 */
        .variant-a .content {
            grid-template-columns: 50mm 1fr;
            gap: 5mm;
        }

        .variant-a .requirement {
            grid-template-rows: 16mm 1fr;
            gap: 1mm 4mm;
        }

        .variant-a .range { font-size: 24pt; }

        .variant-a .attr {
            grid-template-columns: 15mm 1fr;
            padding: 0 3mm;
        }

        .variant-a .attr img {
            width: 13mm;
            height: 13mm;
        }

        .variant-a .attr-name { font-size: 9.5pt; }

        /* B：放大需求數字與圖案，優先讓 5 歲孩子辨識。 */
        .variant-b .content {
            grid-template-columns: 43mm 1fr;
            gap: 3mm;
        }

        .variant-b .requirement {
            grid-template-rows: 20mm 1fr;
            gap: 0.5mm 2mm;
        }

        .variant-b .range { font-size: 32pt; }

        .variant-b .attr {
            grid-template-columns: 21mm 1fr;
            padding: 0 1.5mm;
        }

        .variant-b .attr img {
            width: 19mm;
            height: 19mm;
        }

        .variant-b .attr-name { font-size: 10.5pt; }

        @media print {
            html,
            body { background: #fff; }
            .page { margin: 0; }
            .comparison-cell { border-color: transparent; }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="comparison-cell variant-a">
            <span class="variant-label">A｜緊湊比例</span>
            <div class="card-shell">
                <article class="reveal-card">
                    <header class="card-header">
                        <span class="card-number">1</span>
                        <h2 class="card-title">找出安全道路</h2>
                        <span class="player-count">選 1 隻動物</span>
                    </header>
                    <div class="scene">
                        <img src="mission-art/storm-forest-rescue/01-flooded-road.png" alt="暴雨後積水與倒木阻擋道路">
                    </div>
                    <div class="content">
                        <div class="reason">
                            <strong>積水和倒木擋住路</strong>
                            要及時找出安全路線，也不能滑倒。
                        </div>
                        <div class="requirement">
                            <div class="range">4-6</div>
                            <div class="attr">
                                <img src="attribute-illustrations/speed.png" alt="">
                                <span class="attr-name">速度</span>
                            </div>
                            <div class="attr">
                                <img src="attribute-illustrations/smart.png" alt="">
                                <span class="attr-name">聰明</span>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </section>

        <section class="comparison-cell variant-b">
            <span class="variant-label">B｜辨識優先</span>
            <div class="card-shell">
                <article class="reveal-card">
                    <header class="card-header">
                        <span class="card-number">1</span>
                        <h2 class="card-title">找出安全道路</h2>
                        <span class="player-count">選 1 隻動物</span>
                    </header>
                    <div class="scene">
                        <img src="mission-art/storm-forest-rescue/01-flooded-road.png" alt="暴雨後積水與倒木阻擋道路">
                    </div>
                    <div class="content">
                        <div class="reason">
                            <strong>積水和倒木擋住路</strong>
                            要及時找出安全路線，也不能滑倒。
                        </div>
                        <div class="requirement">
                            <div class="range">4-6</div>
                            <div class="attr">
                                <img src="attribute-illustrations/speed.png" alt="">
                                <span class="attr-name">速度</span>
                            </div>
                            <div class="attr">
                                <img src="attribute-illustrations/smart.png" alt="">
                                <span class="attr-name">聰明</span>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
