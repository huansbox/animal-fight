<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>團隊任務寶物、後援與區域卡｜A4 四分標籤</title>
    <style>
        @page { size: A4 portrait; margin: 0; }

        @font-face {
            font-family: "Bpmf Rounded";
            src: url("fonts/bopomofo/rounded-medium.woff2") format("woff2");
            font-style: normal;
            font-weight: 500;
            font-display: block;
        }

        @font-face {
            font-family: "Bpmf Rounded";
            src: url("fonts/bopomofo/rounded-bold.woff2") format("woff2");
            font-style: normal;
            font-weight: 800;
            font-display: block;
        }

        :root {
            --font: "Bpmf Rounded", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        * { box-sizing: border-box; }

        html,
        body {
            margin: 0;
            background: #ccc;
            color: #000;
            font-family: var(--font);
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .page {
            position: relative;
            width: 210mm;
            height: 297mm;
            display: grid;
            grid-template-columns: repeat(2, 105mm);
            grid-template-rows: repeat(2, 148.5mm);
            margin: 8mm auto;
            overflow: hidden;
            background: #fff;
            break-after: page;
            page-break-after: always;
        }

        .page:last-child {
            break-after: auto;
            page-break-after: auto;
        }

        .label-cell {
            position: relative;
            width: 105mm;
            height: 148.5mm;
            overflow: hidden;
            border-right: 0.15mm solid #bbb;
            border-bottom: 0.15mm solid #bbb;
        }

        .card {
            position: absolute;
            inset: 4.5mm;
            display: grid;
            grid-template-rows: 8mm 48mm 15mm 1fr;
            align-items: center;
            justify-items: center;
            padding: 4.5mm 5mm;
            overflow: hidden;
            border: 0.8mm solid #000;
            border-radius: 4mm;
            background: #fff;
            text-align: center;
        }

        .kicker {
            align-self: start;
            padding: 1.2mm 3.5mm;
            border-radius: 8mm;
            background: #000;
            color: #fff;
            font-family: system-ui, sans-serif;
            font-size: 8.5pt;
            font-weight: 850;
            letter-spacing: 0.12em;
        }

        .art {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: multiply;
        }

        .title {
            margin: 0;
            font-size: 18pt;
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: 0.08em;
        }

        .treasure-rule {
            align-self: stretch;
            width: 100%;
            display: grid;
            align-content: center;
            gap: 1.5mm;
            padding-top: 2mm;
            border-top: 0.35mm solid #000;
            font-weight: 500;
        }

        .rule-lead,
        .rule-foot {
            margin: 0;
            font-size: 10.5pt;
            font-weight: 800;
            line-height: 1.5;
            letter-spacing: 0.06em;
        }

        .rule-rows {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1mm;
            font-family: system-ui, "PingFang TC", sans-serif;
        }

        .rule-row {
            display: grid;
            place-items: center;
            min-height: 10mm;
            padding: 1mm;
            border: 0.3mm solid #000;
            border-radius: 2mm;
            font-size: 9.4pt;
            font-weight: 850;
            line-height: 1.25;
        }

        .mirror .rule-rows {
            grid-template-columns: 1fr;
        }

        .mirror .rule-row {
            min-height: 7mm;
            font-family: var(--font);
            font-size: 9pt;
            letter-spacing: 0.04em;
        }

        .reserve .card {
            grid-template-rows: 8mm 59mm 16mm 1fr 9mm;
            border-style: double;
            border-width: 1.5mm;
        }

        .reserve .title { font-size: 20pt; }

        .reserve-copy {
            margin: 0;
            font-size: 11pt;
            font-weight: 500;
            line-height: 1.6;
            letter-spacing: 0.06em;
        }

        .flip-note {
            align-self: end;
            width: 100%;
            padding-top: 2mm;
            border-top: 0.35mm solid #000;
            font-size: 9.5pt;
            font-weight: 800;
            letter-spacing: 0.06em;
        }

        .zone-cell .card {
            inset: auto;
            top: 26.75mm;
            left: -16.75mm;
            width: 138.5mm;
            height: 95mm;
            grid-template-columns: 1fr;
            grid-template-rows: 60mm 1fr;
            gap: 2mm;
            padding: 8mm;
            transform: rotate(-90deg);
        }

        .zone-cell .art {
            grid-column: 1;
            grid-row: 1;
            width: 116mm;
            height: 60mm;
        }

        .zone-cell .title {
            grid-column: 1;
            grid-row: 2;
            justify-self: center;
            font-size: 24pt;
            line-height: 1.25;
            text-align: center;
            white-space: nowrap;
        }

        .waiting .card {
            border-style: solid;
            border-width: 0.8mm;
        }

        .retry .card {
            border-style: dashed;
            border-width: 1.2mm;
        }

        .rest .card {
            border-style: dotted;
            border-width: 1.7mm;
        }

        .sheet-note {
            position: absolute;
            right: 7mm;
            bottom: 3mm;
            left: 7mm;
            color: #777;
            font-family: system-ui, sans-serif;
            font-size: 6.5pt;
            text-align: center;
        }

        @media print {
            html,
            body { background: #fff; }
            .page { margin: 0; }
            .label-cell { border-color: transparent; }
            .sheet-note { display: none; }
        }
    </style>
</head>
<body>
    <main id="pages"></main>

    <script>
        const pages = [
            [
                {
                    type: "treasure backpack",
                    kicker: "BOSS 寶物",
                    title: "萬用背包",
                    image: "images-team-status/treasures/universal-backpack-v2.png",
                    lead: "擲 2 顆骰子並相加",
                    rows: ["2–5<br>＋1 顆", "6–9<br>＋2 顆", "10–12<br>＋3 顆"],
                    foot: "分給 A 或 B"
                },
                {
                    type: "treasure flashlight",
                    kicker: "BOSS 寶物",
                    title: "探險手電筒",
                    image: "images-team-status/treasures/adventure-flashlight-v2.png",
                    lead: "擲 4 顆骰子，數奇數",
                    rows: ["1 或 3 顆<br>降 1 級", "2 顆<br>降 2 級", "0 或 4 顆<br>降 3 級"],
                    foot: "手電筒找弱點"
                },
                {
                    type: "treasure mirror",
                    kicker: "BOSS 寶物",
                    title: "變化魔鏡",
                    image: "images-team-status/treasures/change-mirror-v2.png",
                    lead: "擲 3 顆：最大－最小",
                    rows: ["分給失敗骰｜每顆最多＋2｜最多變成 4", "三顆同號：一顆失敗骰變成 4"],
                    foot: "單向支援後使用"
                },
                {
                    type: "reserve",
                    kicker: "全隊資源",
                    title: "全隊後援",
                    image: "images-team-status/reserve-help-v2.png",
                    subtitle: "任務失敗時，可以請另一隻動物接手。",
                    note: "使用後翻面"
                }
            ],
            [
                {
                    type: "reserve",
                    kicker: "全隊資源",
                    title: "全隊後援",
                    image: "images-team-status/reserve-help-v2.png",
                    subtitle: "任務失敗時，可以請另一隻動物接手。",
                    note: "使用後翻面"
                },
                { type: "waiting", title: "待命區", image: "images-team-status/zones/waiting-team-v2.png" },
                { type: "retry", title: "再挑戰區", image: "images-team-status/zones/retry-team-v2.png" },
                { type: "rest", title: "休息區", image: "images-team-status/zones/rest-team-v2.png" }
            ]
        ];

        const root = document.querySelector("#pages");

        function cardMarkup(card) {
            const image = `<img class="art" src="${card.image}" alt="">`;
            if (["waiting", "retry", "rest"].includes(card.type)) {
                return `<div class="card">${image}<h2 class="title">${card.title}</h2></div>`;
            }
            if (card.type === "reserve") {
                return `
                    <div class="card">
                        <div class="kicker">${card.kicker}</div>
                        ${image}
                        <h2 class="title">${card.title}</h2>
                        <p class="reserve-copy">${card.subtitle}</p>
                        <div class="flip-note">${card.note}</div>
                    </div>`;
            }
            return `
                <div class="card">
                    <div class="kicker">${card.kicker}</div>
                    ${image}
                    <h2 class="title">${card.title}</h2>
                    <div class="treasure-rule">
                        <p class="rule-lead">${card.lead}</p>
                        <div class="rule-rows">${card.rows.map((row) => `<div class="rule-row">${row}</div>`).join("")}</div>
                        <p class="rule-foot">${card.foot}</p>
                    </div>
                </div>`;
        }

        pages.forEach((cards, pageIndex) => {
            const page = document.createElement("section");
            page.className = "page";
            cards.forEach((card) => {
                const isZone = ["waiting", "retry", "rest"].includes(card.type);
                const cell = document.createElement("article");
                cell.className = `label-cell ${isZone ? "zone-cell" : ""} ${card.type}`;
                cell.innerHTML = cardMarkup(card);
                page.appendChild(cell);
            });
            const note = document.createElement("p");
            note.className = "sheet-note";
            note.textContent = `第 ${pageIndex + 1} / 2 張｜A4 四分標籤紙｜黑白｜100% 實際大小`;
            page.appendChild(note);
            root.appendChild(page);
        });

        document.fonts.ready.then(() => {
            document.documentElement.dataset.ready = "true";
        });
    </script>
</body>
</html>
