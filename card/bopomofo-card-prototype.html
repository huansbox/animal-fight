<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動物卡片注音字體比較 Prototype</title>
    <style>
        @font-face {
            font-family: "Bpmf Rounded Prototype";
            src: url("fonts/bopomofo-prototype/rounded-medium-subset.woff2") format("woff2");
            font-style: normal;
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: "Bpmf Rounded Prototype";
            src: url("fonts/bopomofo-prototype/rounded-bold-subset.woff2") format("woff2");
            font-style: normal;
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: "Bpmf Gothic Prototype";
            src: url("fonts/bopomofo-prototype/gothic-medium-subset.woff2") format("woff2");
            font-style: normal;
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: "Bpmf Gothic Prototype";
            src: url("fonts/bopomofo-prototype/gothic-bold-subset.woff2") format("woff2");
            font-style: normal;
            font-weight: 700;
            font-display: swap;
        }

        :root {
            --skill-desc-size: 13pt;
            --system-font: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-width: 1060px;
            margin: 0;
            background: #d7d7d7;
            color: #000;
            font-family: var(--system-font);
        }

        .toolbar {
            position: sticky;
            z-index: 10;
            top: 0;
            display: flex;
            align-items: center;
            gap: 18px;
            min-height: 58px;
            padding: 10px 24px;
            border-bottom: 2px solid #000;
            background: rgba(255, 255, 255, 0.96);
        }

        .toolbar h1 {
            margin: 0 auto 0 0;
            font-size: 18px;
        }

        .toolbar label,
        .toolbar button {
            font-size: 14px;
            font-weight: 700;
        }

        .size-buttons {
            display: flex;
            gap: 5px;
        }

        .size-buttons button {
            min-width: 46px;
            padding: 6px 9px;
            border: 1.5px solid #000;
            border-radius: 5px;
            background: #fff;
            cursor: pointer;
        }

        .size-buttons button[aria-pressed="true"] {
            background: #000;
            color: #fff;
        }

        .comparison {
            width: max-content;
            margin: 22px auto 48px;
            padding: 0 24px;
        }

        .column-headings,
        .comparison-row {
            display: grid;
            grid-template-columns: 152px 122mm 122mm;
            column-gap: 26px;
        }

        .column-headings {
            align-items: end;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 800;
            text-align: center;
        }

        .column-headings .empty {
            text-align: left;
        }

        .column-headings small {
            display: block;
            margin-top: 3px;
            font-size: 12px;
            font-weight: 500;
        }

        .comparison-row {
            align-items: start;
            padding: 20px 0 26px;
            border-top: 1px solid #888;
        }

        .font-heading {
            position: sticky;
            top: 76px;
            padding-top: 10px;
        }

        .font-heading strong {
            display: block;
            font-size: 18px;
            line-height: 1.35;
        }

        .font-heading span {
            display: block;
            margin-top: 7px;
            color: #333;
            font-size: 13px;
            line-height: 1.45;
        }

        .font-rounded {
            --bpmf-font: "Bpmf Rounded Prototype";
        }

        .font-gothic {
            --bpmf-font: "Bpmf Gothic Prototype";
        }

        .weight-bold {
            --bpmf-weight: 700;
        }

        .weight-medium {
            --bpmf-weight: 500;
        }

        .card {
            width: 122mm;
            height: 175mm;
            display: grid;
            grid-template-rows: 18mm 70mm 40mm 35mm;
            gap: 1.5mm;
            padding: 3mm;
            border: 0.7mm solid #000;
            border-radius: 4mm;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 3px 9px rgba(0, 0, 0, 0.18);
        }

        .scope-all .zh {
            font-family: var(--bpmf-font), var(--system-font);
            font-weight: var(--bpmf-weight);
            font-synthesis: none;
        }

        .spacing-wide .zh {
            letter-spacing: 0.04em;
        }

        .name-row {
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2mm;
            border-bottom: 0.5mm solid #000;
            white-space: nowrap;
        }

        .animal-name {
            font-size: 23pt;
            font-weight: 900;
            line-height: 1;
        }

        .animal-name-en {
            min-width: 0;
            overflow: hidden;
            font-size: 8.5pt;
            font-weight: 800;
            text-overflow: ellipsis;
        }

        .image-wrap {
            position: relative;
            overflow: hidden;
            border: 0.45mm solid #000;
            border-radius: 2mm;
            background: #eee;
        }

        .image-wrap img {
            width: 100%;
            height: 100%;
            display: block;
            filter: grayscale(1) contrast(1.08);
            object-fit: cover;
            object-position: center 43%;
        }

        .temporary-image {
            position: absolute;
            right: 2mm;
            bottom: 2mm;
            padding: 1mm 1.8mm;
            border: 0.35mm solid #000;
            border-radius: 1mm;
            background: rgba(255, 255, 255, 0.88);
            font-size: 9pt;
            font-weight: 800;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border: 0.5mm solid #000;
            border-radius: 2mm;
            overflow: hidden;
        }

        .stat {
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 0.35mm solid #000;
        }

        .stat:last-child {
            border-right: 0;
        }

        .stat-label {
            font-size: 10pt;
            font-weight: 800;
            line-height: 1.15;
            white-space: nowrap;
        }

        .dice-label {
            margin-top: 0.5mm;
            font-size: 8.5pt;
            font-weight: 700;
            line-height: 1;
        }

        .stat-value {
            margin: 0.5mm 0;
            font-size: 29pt;
            font-weight: 900;
            line-height: 0.95;
        }

        .stat-bonus {
            min-height: 4mm;
            font-size: 9pt;
            font-weight: 900;
            line-height: 1;
        }

        .skill-box {
            padding: 2.2mm 3mm;
            border: 0.5mm solid #000;
            border-radius: 2mm;
            overflow: hidden;
        }

        .skill-title {
            margin-bottom: 1.2mm;
            font-size: 15pt;
            font-weight: 900;
            line-height: 1.15;
        }

        .skill-desc {
            font-size: var(--skill-desc-size);
            font-weight: 700;
            line-height: 1.38;
        }

        .scope-all .skill-desc {
            line-height: 1.46;
        }

        .prototype-note {
            width: calc(244mm + 26px);
            margin-left: 178px;
            padding: 12px 16px;
            border: 1.5px solid #000;
            background: #fff;
            font-size: 13px;
            line-height: 1.55;
        }

        @media print {
            body {
                min-width: 0;
                background: #fff;
            }

            .toolbar,
            .font-heading,
            .column-headings,
            .prototype-note {
                display: none;
            }

            .comparison {
                margin: 0;
                padding: 0;
            }

            .comparison-row {
                display: block;
                padding: 0;
                border: 0;
                page-break-after: always;
            }

            .card {
                display: inline-grid;
                margin: 10mm 5mm;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <header class="toolbar">
        <h1>全卡注音：字體 × 字重 × 字距比較</h1>
        <label>技能說明字級</label>
        <div class="size-buttons" aria-label="切換技能說明字級">
            <button type="button" data-size="12" aria-pressed="false">12pt</button>
            <button type="button" data-size="13" aria-pressed="true">13pt</button>
            <button type="button" data-size="14" aria-pressed="false">14pt</button>
        </div>
    </header>

    <main class="comparison">
        <div class="column-headings">
            <div class="empty">四種候選組合</div>
            <div>標準字距<small>全卡中文字都有注音</small></div>
            <div>稍寬字距<small>letter-spacing: 0.04em</small></div>
        </div>

        <div id="comparison-rows"></div>

        <p class="prototype-note">
            已確定全卡中文字都放注音。本頁只比較圓體／黑體、Bold／Medium 與兩種字距。卡片比例為 122×175mm；圖片先用舊圖灰階暫代。技能加成只放在對應屬性下方，不在技能框重複。
        </p>
    </main>

    <template id="card-template">
        <article class="card">
            <header class="name-row">
                <span class="animal-name zh">加拉巴哥象龜</span>
                <span class="animal-name-en">TORTOISE</span>
            </header>

            <div class="image-wrap">
                <img src="images-realistic/tortoise.png" alt="加拉巴哥象龜舊版圖片">
                <span class="temporary-image zh">舊圖暫代</span>
            </div>

            <section class="stats-grid" aria-label="動物屬性">
                <div class="stat">
                    <span class="stat-label zh">力量</span>
                    <span class="dice-label zh">骰 1</span>
                    <strong class="stat-value">3</strong>
                    <span class="stat-bonus"></span>
                </div>
                <div class="stat">
                    <span class="stat-label zh">速度</span>
                    <span class="dice-label zh">骰 2</span>
                    <strong class="stat-value">1</strong>
                    <span class="stat-bonus"></span>
                </div>
                <div class="stat">
                    <span class="stat-label zh">攻擊</span>
                    <span class="dice-label zh">骰 3</span>
                    <strong class="stat-value">1</strong>
                    <span class="stat-bonus"></span>
                </div>
                <div class="stat">
                    <span class="stat-label zh">防禦</span>
                    <span class="dice-label zh">骰 4</span>
                    <strong class="stat-value">9</strong>
                    <span class="stat-bonus">★ +3</span>
                </div>
                <div class="stat">
                    <span class="stat-label zh">聰明</span>
                    <span class="dice-label zh">骰 5</span>
                    <strong class="stat-value">2</strong>
                    <span class="stat-bonus">★ +1</span>
                </div>
            </section>

            <section class="skill-box">
                <div class="skill-title zh">龜殼堡壘</div>
                <div class="skill-desc zh">縮進堅硬的殼裡，變成一座移動堡壘，任何攻擊都彈開。</div>
            </section>
        </article>
    </template>

    <script>
        const fonts = [
            {
                className: "font-rounded weight-bold",
                name: "源泉注音圓體 Bold",
                note: "原本版本，圓潤厚實"
            },
            {
                className: "font-rounded weight-medium",
                name: "源泉注音圓體 Medium",
                note: "比 Bold 細一級"
            },
            {
                className: "font-gothic weight-bold",
                name: "源石注音黑體 Bold",
                note: "原本版本，筆畫最清楚"
            },
            {
                className: "font-gothic weight-medium",
                name: "源石注音黑體 Medium",
                note: "比 Bold 細一級"
            }
        ];

        const spacings = ["spacing-normal", "spacing-wide"];

        const rows = document.querySelector("#comparison-rows");
        const cardTemplate = document.querySelector("#card-template");

        for (const font of fonts) {
            const row = document.createElement("section");
            row.className = `comparison-row ${font.className}`;

            const heading = document.createElement("div");
            heading.className = "font-heading";
            heading.innerHTML = `<strong>${font.name}</strong><span>${font.note}</span>`;
            row.append(heading);

            for (const spacing of spacings) {
                const card = cardTemplate.content.firstElementChild.cloneNode(true);
                card.classList.add("scope-all", spacing);
                row.append(card);
            }

            rows.append(row);
        }

        for (const button of document.querySelectorAll("[data-size]")) {
            button.addEventListener("click", () => {
                document.documentElement.style.setProperty("--skill-desc-size", `${button.dataset.size}pt`);
                for (const peer of document.querySelectorAll("[data-size]")) {
                    peer.setAttribute("aria-pressed", String(peer === button));
                }
            });
        }
    </script>
</body>
</html>
